<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>입시의 기세 - 2026 합격생 후기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans KR"', 'sans-serif'] },
          colors: {
            brand: {
              50:  '#edf7f1',
              100: '#d1ead9',
              200: '#a3d5b3',
              300: '#6dba87',
              400: '#3a9a5e',
              500: '#02451a',
              600: '#023d17',
              700: '#013413',
              800: '#012b10',
              900: '#01220d',
            },
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Noto Sans KR', sans-serif; }
    .card-hover { transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 48px -12px rgba(2, 69, 26, 0.12); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.5s ease-out both; }
    .uni-fb { display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:10px;font-weight:800;color:#fff;flex-shrink:0; }

    /* ─── Video thumbnails ─── */
    .video-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      background: #0a0a0a;
      box-shadow: 0 10px 32px -8px rgba(2, 69, 26, 0.18);
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.35s ease;
    }
    .video-thumb:hover { transform: translateY(-3px); box-shadow: 0 22px 48px -10px rgba(2, 69, 26, 0.28); }
    .video-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .video-thumb:hover img { transform: scale(1.04); }
    .video-thumb::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }
    .video-play {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transition: transform 0.25s ease, background 0.25s ease;
      z-index: 2;
    }
    .video-thumb:hover .video-play { transform: translate(-50%, -50%) scale(1.08); background: #fff; }
    .video-play svg { width: 26px; height: 26px; color: #02451a; margin-left: 3px; }
    .video-label {
      position: absolute; left: 14px; bottom: 12px;
      color: #fff; font-weight: 700; font-size: 13px;
      letter-spacing: 0.2px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      z-index: 2;
    }
    .video-tags {
      position: absolute; left: 12px; right: 12px; bottom: 12px;
      display: flex; flex-wrap: wrap; gap: 4px 6px;
      z-index: 2;
    }
    .video-tag {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #fff;
      font-weight: 700;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.28);
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
      white-space: nowrap;
      line-height: 1.4;
    }
    .video-featured .video-play { width: 84px; height: 84px; }
    .video-featured .video-play svg { width: 34px; height: 34px; margin-left: 4px; }
    .video-featured .video-label { font-size: 15px; left: 20px; bottom: 18px; }
    .video-featured .video-tags { left: 18px; right: 18px; bottom: 16px; gap: 5px 7px; }
    .video-featured .video-tag { font-size: 13px; padding: 4px 12px; }
    .video-rank {
      position: absolute; top: 12px; left: 12px;
      background: rgba(2, 69, 26, 0.92);
      color: #fff; font-weight: 800; font-size: 12px;
      padding: 4px 10px; border-radius: 999px;
      letter-spacing: 0.3px;
      z-index: 2;
    }
    .video-thumb iframe { width: 100%; height: 100%; border: 0; }
  </style>
</head>
<body class="bg-[#fafbfa] min-h-screen">
  <div id="root"></div>

  <script src="./app.js"></script>
</body>
</html>
